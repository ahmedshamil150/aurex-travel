<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurex Executive Travel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="hero">
        <div class="container">
            <h1>Premium Airport Transfers Executive Travel from Cardiff</h1>
            <p>Reliable chauffeur-driven airport transfers from Cardiff and South Wales to all major UK airports, with
                fixed pricing, professional drivers, flight monitoring and luxury vehicles.</p>
            <button type="button" id="bookNowBtn" class="btn-primary">Book Now</button>
        </div>
    </header>

    <!-- Booking Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Book Your Transfer</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required>
                </div>
                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" id="mobile" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="pickup">Pickup Address</label>
                    <input type="text" id="pickup" required>
                </div>
                <div class="form-group">
                    <label for="dropoff">Drop-off Address / Airport</label>
                    <input type="text" id="dropoff" required>
                </div>
                <div class="form-group">
                    <label for="flightNumber">Flight Number (Optional)</label>
                    <input type="text" id="flightNumber">
                </div>
                <div class="form-row">
                    <div class="form-group half">
                        <label for="date">Pickup Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group half">
                        <label for="time">Pickup Time</label>
                        <input type="time" id="time" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group half">
                        <label for="passengers">Number of Passengers</label>
                        <input type="number" id="passengers" min="1" required>
                    </div>
                    <div class="form-group half">
                        <label for="suitcases">Suitcases</label>
                        <input type="number" id="suitcases" min="0" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="vehicle">Vehicle Choice</label>
                    <select id="vehicle" required>
                        <option value="">Select Vehicle</option>
                        <option value="Tesla Model Y">Tesla Model Y</option>
                        <option value="Mercedes E-Class">Mercedes E-Class</option>
                        <option value="Mercedes V-Class">Mercedes V-Class (7 Seater)</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group half">
                        <label for="returnJourney">Return Journey Required?</label>
                        <select id="returnJourney" required>
                            <option value="No">No</option>
                            <option value="Yes">Yes</option>
                        </select>
                    </div>
                    <div class="form-group half">
                        <label for="offeredPrice">Your Offered Price (£)</label>
                        <input type="number" id="offeredPrice" min="0" placeholder="e.g. 150" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="notes">Additional Notes</label>
                    <textarea id="notes" rows="3"></textarea>
                </div>
                <button type="submit" class="btn-primary full-width">Send Booking Request via WhatsApp</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
